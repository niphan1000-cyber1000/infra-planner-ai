version: "3.8"

services:
  # Full-Stack Web Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-architect-advisor
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Define your Gemini API Key here or in local shell environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Production allowed domains
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
