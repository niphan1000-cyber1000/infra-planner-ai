version: "3.8"

services:
  # High-performance Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - app-network

  # Full-Stack Web Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-architect-advisor
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Define your Gemini API Key here or in local shell environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Production allowed domains
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # Redis URL pointing to the redis container within the same Docker network
      - REDIS_URL=redis://redis:6379
    restart: always
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
