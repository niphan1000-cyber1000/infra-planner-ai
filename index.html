<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT System Architecture & Cloud Strategy Advisor</title>
  </head>
  <body style="margin: 0; background-color: #02040a">
    <div id="root">
      <!-- High-fidelity Initial Loading Screen -->
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #02040a;
          color: #f1f5f9;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
        "
      >
        <div style="text-align: center; max-width: 400px; padding: 24px; box-sizing: border-box">
          <!-- Custom SVG Pulse/Radar Loader -->
          <div style="position: relative; width: 64px; height: 64px; margin: 0 auto 24px">
            <div
              style="
                position: absolute;
                border: 3px solid #6366f1;
                opacity: 1;
                border-radius: 50%;
                width: 100%;
                height: 100%;
                animation: initial-pulse 1.8s cubic-bezier(0, 0.2, 0.8, 1) infinite;
              "
            ></div>
            <div
              style="
                position: absolute;
                border: 3px solid #818cf8;
                opacity: 1;
                border-radius: 50%;
                width: 100%;
                height: 100%;
                animation: initial-pulse 1.8s cubic-bezier(0, 0.2, 0.8, 1) infinite;
                animation-delay: -0.9s;
              "
            ></div>
            <div
              style="
                position: absolute;
                top: 16px;
                left: 16px;
                width: 32px;
                height: 32px;
                background: radial-gradient(circle, #6366f1 0%, #4338ca 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
              "
            >
              <!-- Simple custom server icon inside -->
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="color: #ffffff"
              >
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
              </svg>
            </div>
          </div>
          <h1
            style="
              font-size: 16px;
              font-weight: 600;
              margin: 0 0 8px;
              color: #ffffff;
              letter-spacing: 0.05em;
              text-transform: uppercase;
            "
          >
            IT System Architecture
          </h1>
          <p style="font-size: 12px; color: #64748b; margin: 0; line-height: 1.5">
            กำลังเชื่อมต่อระบบวิเคราะห์และเรียกข้อมูลพิมพ์เขียวสถาปัตยกรรม...
          </p>
        </div>
      </div>
      <style>
        @keyframes initial-pulse {
          0% {
            top: 32px;
            left: 32px;
            width: 0;
            height: 0;
            opacity: 1;
          }
          100% {
            top: 0px;
            left: 0px;
            width: 64px;
            height: 64px;
            opacity: 0;
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
